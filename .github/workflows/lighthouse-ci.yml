name: Lighthouse CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ADMIN_TOKEN: lhci-local-admin-token
      CHATBOT_ENABLED: "false"
      CI: "true"
      DATABASE_URL: postgresql://lhci:lhci@localhost:5432/lhci?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
      REWRITER_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci-reports
          path: |
            .lighthouseci
            lighthouse/reports
          if-no-files-found: ignore
          retention-days: 14
